name: 构建并发布APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 赋予执行权限
        run: chmod +x gradlew

      - name: 构建APK
        run: ./gradlew assembleRelease

      - name: 上传APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: app/build/outputs/apk/release/*.apk

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: apk
          path: apks

      - name: 设置时间版本号
        id: build_time
        run: |
          echo "tag=build-$(date -u +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT
          echo "name=自动构建 $(date -u +'%Y年%m月%d日 %H:%M')" >> $GITHUB_OUTPUT

      - name: 创建Release
        uses: softprops/action-gh-release@v2
        with:
          files: apks/*.apk
          tag_name: ${{ steps.build_time.outputs.tag }}
          name: ${{ steps.build_time.outputs.name }}
          body: 手机端自动构建，无签名
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
