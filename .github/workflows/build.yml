name: 构建签名APK并发布Release
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - run: chmod +x gradlew
      - run: ./gradlew assembleRelease

      - name: 签名APK
        uses: ilharp/sign-android-release@v1
        with:
          releaseDir: app/build/outputs/apk/release
          signingKey: ${{ secrets.SIGNING_KEY }}
          keyAlias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: 上传APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: app/build/outputs/apk/release/*-signed.apk

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: apk
          path: apks

      - name: 生成北京时间版本
        id: build_time
        run: |
          echo "tag=build-$(date -d '+8 hour' +'%Y%m%d-%H%M%S')" >> "$GITHUB_OUTPUT"
          echo "name=自动构建 $(date -d '+8 hour' +'%Y年%m月%d日 %H:%M')" >> "$GITHUB_OUTPUT"

      - name: 发布Release
        uses: softprops/action-gh-release@v2
        with:
          files: apks/*.apk
          tag_name: ${{ steps.build_time.outputs.tag }}
          name: ${{ steps.build_time.outputs.name }}
          body: 已签名可直接安装
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
