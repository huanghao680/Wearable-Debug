name: Build & Release Signed APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build unsigned APK
        run: ./gradlew assembleRelease

      - name: Sign APK (手机也能用的在线签名)
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: app/build/outputs/apk/release/*.apk

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: apk
          path: apks

      - name: Set build time
        id: build_time
        run: |
          echo "tag=build-$(date -u +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT
          echo "name=自动构建 $(date -u +'%Y年%m月%d日 %H:%M')" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: apks/*.apk
          tag_name: ${{ steps.build_time.outputs.tag }}
          name: ${{ steps.build_time.outputs.name }}
          body: GitHub Actions 自动构建+签名
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew assembleRelease

      # 6. 上传 APK 作为构建产物
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: wearable-debug-apk
          path: app/build/outputs/apk/release/app-release-unsigned.apk
